name: SchoolDomnak GHCR Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: kimheang-code-it

jobs:
  publish:
    name: Build and push to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend images (shared Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/schooldomnak-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/schooldomnak-backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/schooldomnak-celery-worker:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/schooldomnak-celery-worker:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/schooldomnak-celery-beat:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/schooldomnak-celery-beat:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/schooldomnak-telegram-bot:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/schooldomnak-telegram-bot:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          target: build
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/schooldomnak-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/schooldomnak-frontend:${{ github.sha }}

      # Deploy runs in k8s-local-deploy.yml on the self-hosted runner — not here.
