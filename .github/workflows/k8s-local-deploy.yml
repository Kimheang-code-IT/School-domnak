name: SchoolDomnak K8s Local Deploy

on:
  workflow_run:
    workflows:
      - SchoolDomnak GHCR Publish
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  K8S_NAMESPACE: schooldomnak

jobs:
  deploy:
    name: Deploy to Docker Desktop Kubernetes
    runs-on: self-hosted
    if: >
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Check kubectl
        run: |
          kubectl version --client
          kubectl cluster-info

      - name: Log in to GHCR (Docker)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update GHCR pull secret in cluster
        run: |
          kubectl apply -f deploy/kubernetes/namespace.yaml
          kubectl create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Verify application secret exists
        run: |
          if ! kubectl get secret school-secrets -n ${{ env.K8S_NAMESPACE }} >/dev/null 2>&1; then
            echo "::error::Secret school-secrets not found in namespace ${{ env.K8S_NAMESPACE }}."
            echo "Create it once on your machine (see README.md), for example:"
            echo "  kubectl create secret generic school-secrets -n schooldomnak --from-env-file=.env"
            exit 1
          fi

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f deploy/kubernetes/namespace.yaml
          kubectl apply -f deploy/kubernetes/configmap.yaml
          kubectl apply -f deploy/kubernetes/postgres/
          kubectl apply -f deploy/kubernetes/redis/
          kubectl apply -f deploy/kubernetes/backend/
          kubectl apply -f deploy/kubernetes/frontend/
          kubectl apply -f deploy/kubernetes/celery/
          kubectl apply -f deploy/kubernetes/telegram/
          kubectl apply -f deploy/kubernetes/nginx/

      - name: Restart deployments to pull latest images
        run: |
          kubectl rollout restart deployment/school-backend -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout restart deployment/school-frontend -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout restart deployment/school-celery-worker -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout restart deployment/school-celery-beat -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout restart deployment/school-telegram-bot -n ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/school-backend -n ${{ env.K8S_NAMESPACE }} --timeout=180s
          kubectl rollout status deployment/school-frontend -n ${{ env.K8S_NAMESPACE }} --timeout=180s
          kubectl rollout status deployment/school-celery-worker -n ${{ env.K8S_NAMESPACE }} --timeout=180s || true
          kubectl rollout status deployment/school-telegram-bot -n ${{ env.K8S_NAMESPACE }} --timeout=180s || true

      - name: Show pods and services
        run: |
          kubectl get pods -n ${{ env.K8S_NAMESPACE }}
          kubectl get svc -n ${{ env.K8S_NAMESPACE }}
