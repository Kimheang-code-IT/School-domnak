name: SchoolDomnak CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Validate and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare environment file for Compose
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          fi
          mkdir -p secrets uploads
          touch secrets/.gitkeep uploads/.gitkeep

      - name: Check Docker version
        run: docker version

      - name: Check Docker Compose version
        run: docker compose version

      - name: Validate docker-compose.yml
        run: |
          if [ -f docker-compose.yml ]; then
            docker compose -f docker-compose.yml config
          elif [ -f compose.yml ]; then
            docker compose -f compose.yml config
          else
            echo "ERROR: No docker-compose.yml or compose.yml found"
            exit 1
          fi

      - name: Validate docker-compose.prod.yml
        run: |
          if [ -f docker-compose.prod.yml ]; then
            docker compose -f docker-compose.prod.yml config
          fi

      - name: Build backend image
        run: docker build -t schooldomnak-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t schooldomnak-frontend:ci --target build ./Frontend

      - name: Validate Kubernetes manifests (YAML)
        run: |
          pip install --quiet pyyaml
          python3 <<'PY'
          import pathlib
          import sys
          import yaml

          root = pathlib.Path("deploy/kubernetes")
          errors = []
          for path in sorted(root.rglob("*.yaml")):
              if path.name == "secret.example.yaml":
                  continue
              try:
                  for doc in yaml.safe_load_all(path.read_text(encoding="utf-8")):
                      if doc is None:
                          continue
                      if not doc.get("kind") or not doc.get("apiVersion"):
                          errors.append(f"{path}: document missing kind/apiVersion")
              except Exception as exc:
                  errors.append(f"{path}: {exc}")

          if errors:
              print("\n".join(errors))
              sys.exit(1)
          print(f"OK: validated {len(list(root.rglob('*.yaml')))} YAML files")
          PY

      # No push, no deploy.
