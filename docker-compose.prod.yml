# Production compose: pull pre-built images from GHCR (no local build).
# Requires .env on the server (never commit .env).
# Used by .github/workflows/local-deploy.yml on the self-hosted runner.

services:
  postgres:
    image: postgres:16-alpine
    container_name: school-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-school_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "15432:5432"
    volumes:
      - school_postgres_data:/var/lib/postgresql/data
    networks:
      - school_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-school_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: school-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    networks:
      - school_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: ghcr.io/kimheang-code-it/schooldomnak-frontend:latest
    pull_policy: always
    container_name: school-frontend-build
    volumes:
      - frontend_dist:/output
    command:
      - sh
      - -c
      - rm -rf /output/* && cp -a /app/.output/public/. /output/ && echo "Static files copied to volume"
    networks:
      - school_network
    restart: "no"

  backend:
    image: ghcr.io/kimheang-code-it/schooldomnak-backend:latest
    pull_policy: always
    container_name: school-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RUN_DB_MIGRATIONS: "true"
      TELEGRAM_POLLING_ROLE: "disabled"
      TELEGRAM_POLLING_IN_API: "false"
      TELEGRAM_USE_POLLING: "false"
    ports:
      - "18000:8000"
    volumes:
      - ./secrets:/app/secrets:ro
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - school_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 40s

  telegram_bot:
    image: ghcr.io/kimheang-code-it/schooldomnak-telegram-bot:latest
    pull_policy: always
    container_name: school-telegram-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RUN_DB_MIGRATIONS: "false"
      TELEGRAM_POLLING_ROLE: "dedicated"
      TELEGRAM_POLLING_IN_API: "false"
      TELEGRAM_USE_POLLING: "true"
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - school_network
    command: python scripts/run_telegram_polling.py

  celery_worker:
    image: ghcr.io/kimheang-code-it/schooldomnak-celery-worker:latest
    pull_policy: always
    container_name: school-celery-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RUN_DB_MIGRATIONS: "false"
      TELEGRAM_POLLING_ROLE: "disabled"
      TELEGRAM_POLLING_IN_API: "false"
      TELEGRAM_USE_POLLING: "false"
    volumes:
      - ./secrets:/app/secrets:ro
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - school_network
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info

  celery_beat:
    image: ghcr.io/kimheang-code-it/schooldomnak-celery-beat:latest
    pull_policy: always
    container_name: school-celery-beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RUN_DB_MIGRATIONS: "false"
      TELEGRAM_POLLING_ROLE: "disabled"
      TELEGRAM_POLLING_IN_API: "false"
      TELEGRAM_USE_POLLING: "false"
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started
    networks:
      - school_network
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info

  nginx:
    image: nginx:1.27-alpine
    container_name: school-nginx
    ports:
      - "18080:80"
      - "18443:443"
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./uploads:/app/uploads:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_completed_successfully
    networks:
      - school_network
    restart: unless-stopped

networks:
  school_network:
    name: school_network
    driver: bridge

volumes:
  school_postgres_data:
    name: school_postgres_data
  frontend_dist:
    name: school_frontend_dist
