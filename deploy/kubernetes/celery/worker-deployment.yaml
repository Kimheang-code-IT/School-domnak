apiVersion: apps/v1
kind: Deployment
metadata:
  name: school-celery-worker
  namespace: schooldomnak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: school-celery-worker
  template:
    metadata:
      labels:
        app: school-celery-worker
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: celery-worker
          image: ghcr.io/kimheang-code-it/schooldomnak-celery-worker:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: school-config
            - secretRef:
                name: school-secrets
          env:
            - name: RUN_DB_MIGRATIONS
              value: "false"
            - name: TELEGRAM_POLLING_ROLE
              value: "disabled"
            - name: TELEGRAM_USE_POLLING
              value: "false"
          command:
            - celery
            - -A
            - app.core.celery_app.celery_app
            - worker
            - --loglevel=info
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: school-uploads-pvc
