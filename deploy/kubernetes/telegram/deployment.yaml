apiVersion: apps/v1
kind: Deployment
metadata:
  name: school-telegram-bot
  namespace: schooldomnak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: school-telegram-bot
  template:
    metadata:
      labels:
        app: school-telegram-bot
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: telegram-bot
          image: ghcr.io/kimheang-code-it/schooldomnak-telegram-bot:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: school-config
            - secretRef:
                name: school-secrets
          env:
            - name: RUN_DB_MIGRATIONS
              value: "false"
            - name: TELEGRAM_POLLING_ROLE
              value: "dedicated"
            - name: TELEGRAM_USE_POLLING
              value: "true"
          command:
            - python
            - scripts/run_telegram_polling.py
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: secrets
              mountPath: /app/secrets
              readOnly: true
      volumes:
        - name: secrets
          emptyDir: {}
