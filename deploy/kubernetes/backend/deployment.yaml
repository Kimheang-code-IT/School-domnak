apiVersion: apps/v1
kind: Deployment
metadata:
  name: school-backend
  namespace: schooldomnak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: school-backend
  template:
    metadata:
      labels:
        app: school-backend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: backend
          image: ghcr.io/kimheang-code-it/schooldomnak-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: school-config
            - secretRef:
                name: school-secrets
          env:
            # Override .env hostnames (postgres/redis) with Kubernetes service names
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: school-config
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: school-config
                  key: REDIS_URL
            - name: CELERY_BROKER_URL
              valueFrom:
                configMapKeyRef:
                  name: school-config
                  key: CELERY_BROKER_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                configMapKeyRef:
                  name: school-config
                  key: CELERY_RESULT_BACKEND
            - name: RUN_DB_MIGRATIONS
              value: "true"
            - name: TELEGRAM_POLLING_ROLE
              value: "disabled"
            - name: TELEGRAM_USE_POLLING
              value: "false"
          command:
            - uvicorn
            - app.main:app
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: secrets
              mountPath: /app/secrets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: school-uploads-pvc
        - name: secrets
          emptyDir: {}
