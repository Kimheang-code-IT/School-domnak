apiVersion: apps/v1
kind: Deployment
metadata:
  name: school-backend
  namespace: schooldomnak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: school-backend
  template:
    metadata:
      labels:
        app: school-backend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: backend
          image: ghcr.io/kimheang-code-it/schooldomnak-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: school-config
            - secretRef:
                name: school-secrets
          env:
            - name: RUN_DB_MIGRATIONS
              value: "true"
            - name: TELEGRAM_POLLING_ROLE
              value: "disabled"
            - name: TELEGRAM_USE_POLLING
              value: "false"
          command:
            - uvicorn
            - app.main:app
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: secrets
              mountPath: /app/secrets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: school-uploads-pvc
        - name: secrets
          emptyDir: {}
