apiVersion: apps/v1
kind: Deployment
metadata:
  name: school-frontend
  namespace: schooldomnak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: school-frontend
  template:
    metadata:
      labels:
        app: school-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: copy-static
          image: ghcr.io/kimheang-code-it/schooldomnak-frontend:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - rm -rf /html/* && cp -a /app/.output/public/. /html/
          volumeMounts:
            - name: html
              mountPath: /html
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: html
          emptyDir: {}
