apiVersion: v1
kind: ConfigMap
metadata:
  name: school-config
  namespace: schooldomnak
data:
  APP_NAME: "School Registration System"
  APP_ENV: "production"
  APP_DEBUG: "false"
  POSTGRES_DB: "school_db"
  POSTGRES_USER: "postgres"
  DATABASE_URL: "postgresql+psycopg2://postgres:postgres@school-postgres:5432/school_db"
  REDIS_URL: "redis://school-redis:6379/0"
  CELERY_BROKER_URL: "redis://school-redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://school-redis:6379/1"
  USE_CELERY_TASKS: "true"
  CELERY_BEAT_HANDLES_SCHEDULES: "true"
  UPLOAD_DIR: "/app/uploads"
  RUN_DB_MIGRATIONS: "true"
  TELEGRAM_POLLING_IN_API: "false"
  TELEGRAM_ACTIVITY_ALERTS_ENABLED: "true"
  BACKEND_CORS_ORIGINS: "http://localhost,http://127.0.0.1"
  GOOGLE_SHEETS_BACKUP_ENABLED: "false"
  GOOGLE_SERVICE_ACCOUNT_FILE: "/app/secrets/service-account-key.json"
  BACKUP_TIMEZONE: "Asia/Phnom_Penh"
  BACKUP_SCHEDULE_HOUR: "19"
  BACKUP_SCHEDULE_MINUTE: "0"
