# Example only — do NOT commit real values.
# Create the live secret on your machine:
#
#   kubectl create namespace schooldomnak --dry-run=client -o yaml | kubectl apply -f -
#   kubectl create secret generic school-secrets -n schooldomnak \
#     --from-literal=SECRET_KEY=change-me \
#     --from-literal=POSTGRES_PASSWORD=postgres \
#     --from-literal=TELEGRAM_BOT_TOKEN=change-me \
#     --from-literal=TELEGRAM_CHAT_ID=change-me \
#     --from-literal=TELEGRAM_WEBHOOK_SECRET=change-me \
#     --from-literal=GOOGLE_SPREADSHEET_ID=change-me
#
# Or from .env (never commit .env):
#   kubectl create secret generic school-secrets -n schooldomnak --from-env-file=.env
apiVersion: v1
kind: Secret
metadata:
  name: school-secrets
  namespace: schooldomnak
type: Opaque
stringData:
  SECRET_KEY: change-me
  POSTGRES_PASSWORD: postgres
  TELEGRAM_BOT_TOKEN: change-me
  TELEGRAM_CHAT_ID: change-me
  TELEGRAM_WEBHOOK_SECRET: change-me
  GOOGLE_SPREADSHEET_ID: change-me
